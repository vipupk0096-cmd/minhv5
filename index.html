<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CÔNG CỤ GIÁ - TRANG TÂY</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #2d3436; --gray: #636e72; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 600px; margin: auto; }
        
        .controls { 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: sticky; top: 5px; z-index: 1000;
            border: 1px solid #e1e4e8; margin-bottom: 20px;
        }
        
        #upload { display: none; }
        .custom-upload {
            display: block; background: var(--primary); color: white;
            padding: 15px; text-align: center; border-radius: 10px;
            cursor: pointer; font-weight: bold; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,123,255,0.3);
            font-size: 1.1rem;
        }

        .grid-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: 1 / -1; }
        
        .formula-group { 
            background: #f8f9fa; padding: 10px; border-radius: 8px; 
            grid-column: 1 / -1; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 8px; border: 1px dashed #ced4da;
        }
        
        label { font-weight: 700; font-size: 0.75rem; color: #636e72; display: block; margin-bottom: 4px; text-transform: uppercase; }
        input, select, button { 
            width: 100%; padding: 12px; border: 1.5px solid #dfe6e9; 
            border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; 
        }

        .action-buttons { display: flex; gap: 10px; margin-top: 15px; grid-column: 1 / -1; }
        #downloadBtn { background: var(--gray); color: white; border: none; flex: 1; font-weight: bold; height: 55px; }
        #shareBtn { background: var(--success); color: white; border: none; flex: 1.5; font-weight: bold; height: 55px; }
        
        .preview-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 480px) { .preview-grid { grid-template-columns: 1fr 1fr; } }
        
        .preview-item { background: white; padding: 8px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        canvas { width: 100%; height: auto; border-radius: 4px; display: block; margin-bottom: 5px; }
        .img-name { font-size: 10px; color: #999; word-break: break-all; }
        
        .status { text-align: center; margin-top: 10px; font-weight: bold; color: var(--primary); font-size: 0.9rem; grid-column: 1 / -1; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div class="grid-settings">
            <div class="full-width">
                <label>1. Chọn ảnh (Tên file: 16b hoặc 16b/18l)</label>
                <label for="upload" class="custom-upload" id="file-label">📸 CHỌN ẢNH TỪ MÁY</label>
                <input type="file" id="upload" accept="image/*" multiple>
            </div>
            
            <div>
                <label>2. Nhà cung cấp</label>
                <select id="supplier">
                    <option value="1A801">Lan Tùng (1A801)</option>
                    <option value="1A802">Khải Kiệt (1A802)</option>
                    <option value="1A803">Alan (1A803)</option>
                    <option value="1A804">A Chu (1A804)</option>
                    <option value="1A805">A Sần (1A805)</option>
                    <option value="1A806">A Minh (1A806)</option>
                    <option value="1A807">A Tang (1A807)</option>
                    <option value="1A808">A Tâu (1A808)</option>
                    <option value="1A809">A Lý (1A809)</option>
                    <option value="1A810">A Hồng (1A810)</option>
                    <option value="1A811">A Sinh (1A811)</option>
                    <option value="1A812">A Long (1A812)</option>
                    <option value="1A813">Sanly (1A813)</option>
                    <option value="1A814">Sinh Ủng (1A814)</option>
                    <option value="1A815">Mây Già (1A815)</option>
                    <option value="1A816">A Ly (1A816)</option>
                    <option value="1A817">A Chung (1A817)</option>
                    <option value="1A818">A Bình (1A818)</option>
                    <option value="1A819">Seo Hoàng (1A819)</option>
                    <option value="1A820">A Linh (1A820)</option>
                    <option value="1A821">MongManh (1A821)</option>
                    <option value="1A822">A Chân (1A822)</option>
                    <option value="1A823">Seo Hoàng Già (1A823)</option>
                    <option value="1A824">A Hỷ (1A824)</option>
                    <option value="1A825">A Vũ (1A825)</option>
                    <option value="1A826">Hoa Túi (1A826)</option>
                    <option value="1A827">A Văn - A Hoa (1A827)</option>
                    <option value="1A828">Mây Trẻ (1A828)</option>
                    <option value="1A829">Khải Béo (1A829)</option>
                    <option value="1A830">A Sinh Nam (1A830)</option>
                </select>
            </div>
            
            <div>
                <label>3. Vị trí chữ</label>
                <select id="textPos">
                    <option value="top-left">Trái - Trên</option>
                    <option value="bottom-right" selected>Phải - Dưới</option>
                </select>
            </div>

            <div class="formula-group">
                <div><label>Giá Trung (Tệ)</label><input type="number" id="giaTrung" value="3.9" step="0.1"></div>
                <div><label>Phí Thêm</label><input type="number" id="extraPrice" value="0"></div>
                <div><label>Người Lớn (L)</label><input type="number" id="giaNguoiLon" value="17"></div>
                <div><label>Trẻ Con (B)</label><input type="number" id="giaTreEm" value="15"></div>
            </div>

            <div class="action-buttons">
                <button id="downloadBtn">TẢI MÁY</button>
                <button id="shareBtn">CHIA SẺ</button>
            </div>
            
            <div id="status" class="status">Sẵn sàng</div>
        </div>
    </div>
    
    <div id="previewGrid" class="preview-grid"></div>
</div>

<script>
    const $ = id => document.getElementById(id);
    const upload = $('upload'), previewGrid = $('previewGrid'), status = $('status'), 
          downloadBtn = $('downloadBtn'), shareBtn = $('shareBtn'), fileLabel = $('file-label');
    
    let fileData = [];

    // Load cấu hình đã lưu
    window.onload = () => {
        const saved = localStorage.getItem('config_shoes');
        if (saved) {
            const cfg = JSON.parse(saved);
            ['supplier', 'giaTrung', 'giaNguoiLon', 'giaTreEm', 'extraPrice', 'textPos'].forEach(id => {
                if(cfg[id] !== undefined) $(id).value = cfg[id];
            });
        }
    };

    function getConfig() {
        const cfg = {
            supplier: $('supplier').value,
            giaTrung: parseFloat($('giaTrung').value) || 0,
            giaNguoiLon: parseFloat($('giaNguoiLon').value) || 0,
            giaTreEm: parseFloat($('giaTreEm').value) || 0,
            extraPrice: parseFloat($('extraPrice').value) || 0,
            pos: $('textPos').value
        };
        localStorage.setItem('config_shoes', JSON.stringify(cfg));
        return cfg;
    }

    function calculatePrice(filename, config) {
        // Tách lấy phần tên, bỏ đuôi mở rộng
        const cleanName = filename.split('.')[0];
        const processPart = (part) => {
            const m = part.trim().match(/^(\d+)([blBL])/);
            if (m) {
                const num = parseFloat(m[1]);
                const type = m[2].toLowerCase();
                const base = num * config.giaTrung;
                const final = (type === 'l' ? base + config.giaNguoiLon : base + config.giaTreEm) + config.extraPrice;
                return Math.round(final);
            }
            return part; // Giữ nguyên nếu không đúng định dạng 16b/16l
        };

        if (cleanName.includes('/')) {
            return cleanName.split('/').map(processPart).join('/');
        }
        return processPart(cleanName);
    }

    async function render(index, canvas) {
        return new Promise(async (resolve) => {
            const img = await loadImage(fileData[index]);
            const config = getConfig();
            const priceResult = calculatePrice(fileData[index].name, config);
            const displayText = `${config.supplier}Ht${priceResult}`;

            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            // Cỡ chữ tự động theo độ phân giải (8% chiều rộng)
            const fontSize = Math.floor(img.width * 0.08); 
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.fillStyle = "white";
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.shadowBlur = fontSize / 4;
            ctx.strokeStyle = "black";
            ctx.lineWidth = fontSize / 15;

            const margin = fontSize * 0.6;
            const metrics = ctx.measureText(displayText);
            let x = margin, y = fontSize + margin;
            
            if (config.pos === 'bottom-right') {
                x = img.width - metrics.width - margin;
                y = img.height - margin;
            }
            
            ctx.strokeText(displayText, x, y);
            ctx.fillText(displayText, x, y);
            resolve();
        });
    }

    function loadImage(file) {
        return new Promise(res => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => res(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    upload.onchange = async (e) => {
        fileData = Array.from(e.target.files);
        if (fileData.length > 0) {
            fileLabel.innerText = `✅ ĐÃ CHỌN ${fileData.length} ẢNH`;
            fileLabel.style.background = "var(--success)";
            status.innerText = "Đang xử lý ảnh...";
        }
        
        previewGrid.innerHTML = "";
        for (let i = 0; i < fileData.length; i++) {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `<canvas></canvas><div class="img-name">${fileData[i].name}</div>`;
            previewGrid.appendChild(div);
            await render(i, div.querySelector('canvas'));
        }
        status.innerText = "Đã xử lý xong!";
    };

    // Tự cập nhật khi thay đổi thông số bất kỳ
    ['supplier', 'giaTrung', 'giaNguoiLon', 'giaTreEm', 'extraPrice', 'textPos'].forEach(id => {
        $(id).onchange = async () => {
            const canvases = document.querySelectorAll('canvas');
            if(canvases.length > 0) {
                status.innerText = "Đang cập nhật...";
                for (let i = 0; i < canvases.length; i++) await render(i, canvases[i]);
                status.innerText = "Đã cập nhật!";
            }
        };
    });

    downloadBtn.onclick = async () => {
        if (!fileData.length) return alert("Bạn chưa chọn ảnh nào!");
        status.innerText = "Đang tải xuống...";
        const canvases = document.querySelectorAll('canvas');
        for (let i = 0; i < canvases.length; i++) {
            const link = document.createElement('a');
            link.download = `HT-${fileData[i].name}`;
            link.href = canvases[i].toDataURL('image/jpeg', 0.9);
            link.click();
            await new Promise(r => setTimeout(r, 400)); // Delay để tránh lỗi trình duyệt
        }
        status.innerText = "Tải xuống hoàn tất!";
    };

    shareBtn.onclick = async () => {
        if (!navigator.share) return alert("Trình duyệt không hỗ trợ Chia sẻ trực tiếp. Hãy dùng Chrome hoặc Safari!");
        if (!fileData.length) return alert("Chưa có ảnh để chia sẻ!");
        
        status.innerText = "Đang chuẩn bị chia sẻ...";
        const files = [];
        const canvases = document.querySelectorAll('canvas');
        
        for (let i = 0; i < canvases.length; i++) {
            const blob = await new Promise(r => canvases[i].toBlob(r, 'image/jpeg', 0.9));
            files.push(new File([blob], `HT-${fileData[i].name}`, {type: 'image/jpeg'}));
        }
        
        try {
            await navigator.share({ files });
            status.innerText = "Chia sẻ thành công!";
        } catch(e) {
            status.innerText = "Đã hủy chia sẻ.";
        }
    };
</script>
</body>
</html>
